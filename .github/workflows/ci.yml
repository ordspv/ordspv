name: ci

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # fully offline: fixtures are vendored and self-verifying.
      # Coverage thresholds (vitest.config.ts) gate against regressions.
      - run: npm run test:coverage
      - run: npx tsc --noEmit
      # publish pipeline stays green: tsup ESM + tsc declarations + pack dry-run
      - run: npm run build
