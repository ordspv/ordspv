# Weekly dependency maintenance. npm updates arrive as one grouped PR to keep
# review cheap; GitHub Actions pins get the same treatment. CI (offline tests,
# typecheck, build, coverage gate) is the merge arbiter.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    groups:
      npm-dependencies:
        patterns:
          - "*"

  # tools/docs is its own manifest (typedoc + its pinned-line typescript);
  # the root entry does not see path-dependency manifests.
  - package-ecosystem: npm
    directory: /tools/docs
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    groups:
      docs-tooling:
        patterns:
          - "*"
    ignore:
      # typescript is deliberately 6.0.x here: typedoc's peer range excludes
      # TS 7 (whose native compiler drops the JS API typedoc drives — the
      # reason this separate manifest exists). Patch updates stay welcome.
      - dependency-name: typescript
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: Etc/UTC
    groups:
      actions:
        patterns:
          - "*"
